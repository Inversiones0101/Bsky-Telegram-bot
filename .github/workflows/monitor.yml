name: Monitor Financiero VISOR

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          fetch-depth: 0  # Trae todo el historial para evitar conflictos

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerías
        run: pip install -r requirements.txt

      - name: Ejecutar VISOR
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Guardar Memoria (Git Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Forzamos la creación si no existen para que git no de error
          touch last_id_inicio.txt ultimo_rava.txt
          
          git add last_id_inicio.txt ultimo_rava.txt
          
          # Forzamos el commit con -a y un mensaje claro
          git commit -a -m "Actualizar historial [skip ci]" || echo "No hay cambios reales"
          
          # Intentamos el push con un pull previo por si acaso
          git pull --rebase origin main
          git push origin main
